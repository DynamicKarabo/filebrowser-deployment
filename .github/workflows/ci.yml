name: CI — Build and Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  GHCR_OWNER: dynamickarabo

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and export to Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: ghcr.io/${{ env.GHCR_OWNER }}/filebrowser-deployment:${{ github.sha }}
          load: true

      - name: Quick smoke test
        run: |
          docker run --rm -d --name filebrowser-test -p 8080:8080 \
            -e FB_PORT=8080 \
            ghcr.io/${{ env.GHCR_OWNER }}/filebrowser-deployment:${{ github.sha }}
          sleep 3
          curl -sf http://localhost:8080/health || exit 1
          echo "Healthcheck passed ✅"
          docker stop filebrowser-test

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.GHCR_OWNER }}/filebrowser-deployment:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload Trivy results
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.18.0
        with:
          image: ghcr.io/${{ env.GHCR_OWNER }}/filebrowser-deployment:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

      - name: Push to GHCR
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag ghcr.io/${{ env.GHCR_OWNER }}/filebrowser-deployment:${{ github.sha }} \
            ghcr.io/${{ env.GHCR_OWNER }}/filebrowser-deployment:latest
          docker push ghcr.io/${{ env.GHCR_OWNER }}/filebrowser-deployment:latest
          docker push ghcr.io/${{ env.GHCR_OWNER }}/filebrowser-deployment:${{ github.sha }}

      - name: Check image size
        run: |
          IMG_SIZE=$(docker image inspect ghcr.io/${{ env.GHCR_OWNER }}/filebrowser-deployment:${{ github.sha }} --format='{{.Size}}' | numfmt --to=iec)
          echo "Image size: $IMG_SIZE"
