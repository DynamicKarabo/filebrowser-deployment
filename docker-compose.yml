services:
  filebrowser:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: filebrowser
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      FB_PORT: "8080"
      FB_ADDRESS: "0.0.0.0"
      FB_ROOT: /srv
      FB_DATABASE: /database/filebrowser.db
    volumes:
      - filebrowser-data:/srv
      - filebrowser-config:/database
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  filebrowser-data:
  filebrowser-config:
